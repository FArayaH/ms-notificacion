spring.application.name=ms-notificacion
# Puerto del microservicio de notificaciones
server.port=8084

# Conexión a la base de datos MySQL (db_notificacion)
spring.datasource.url=jdbc:mysql://localhost:3306/db_notificacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect